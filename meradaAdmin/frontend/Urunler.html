<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://static.readdy.ai/static/e.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Listings - Real Estate Admin</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
  <link rel="stylesheet" href="css/Urunler.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#6366f1'
          },
          borderRadius: {
            'none': '0px',
            'sm': '4px',
            DEFAULT: '8px',
            'md': '12px',
            'lg': '16px',
            'xl': '20px',
            '2xl': '24px',
            '3xl': '32px',
            'full': '9999px',
            'button': '8px'
          }
        }
      }
    }
  </script>

</head>

<body class="bg-gray-50">

  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <div class="lg:w-64 bg-white shadow-lg">
      <div class="p-6">
            <img 
  src="/meradaGayrimenkul_frontend/img/logo.png" 
  alt="Merada Logo" 
  class="h-10 w-auto  mx-auto">
        <nav class="space-y-2">
          <a href="urunEkle.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-blue-50 rounded-lg">
            <div class="w-5 h-5 flex items-center justify-center mr-3">
              <i class="ri-home-4-line"></i>
            </div>
            Ürün Ekle
          </a>
          <a href="Urunler.html" class="flex items-center px-4 py-3 text-gray-900 bg-blue-100 rounded-lg shadow-lg">
            <div class="w-5 h-5 flex items-center justify-center mr-3">
              <i class="ri-user-line"></i>
            </div>
            Ürünler
          </a>
          <a href="main.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">
            <div class="w-5 h-5 flex items-center justify-center mr-3">
              <i class="ri-file-list-line"></i>
            </div>
            Anasayfa
          </a>
        </nav>
      </div>
    </div>

 <div class="flex-1 bg-gray-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- Sayfa Başlığı -->
    <div class="flex justify-between items-center py-6">
      <h1 class="text-2xl font-bold text-gray-900">Ürünler</h1>
    </div>

    <!-- Grid -->
    <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-8">
      <!-- Kartlar buraya JS ile eklenecek -->
    </div>
  </div>
</div>


<!-- Edit Modal -->
<div id="editModal" class="fixed inset-0 z-50 hidden bg-black/40 backdrop-blur-[2px] overflow-y-auto">
  <div class="min-h-screen flex items-start justify-center p-4 sm:p-6">
    <div class="w-full max-w-6xl bg-white rounded-2xl shadow-2xl border border-gray-200 overflow-hidden">
      
      <div class="flex items-center justify-between px-6 py-4 border-b bg-gray-50 sticky top-0 z-10">
        <div>
          <h2 class="text-xl font-bold text-gray-900">İlan Düzenle</h2>
          <p class="text-sm text-gray-500 mt-1">İlan bilgilerini düzenleyip kaydedebilirsiniz.</p>
        </div>
        <button id="closeEditBtn"
          class="w-10 h-10 rounded-full border border-gray-300 hover:bg-gray-100 text-gray-600 text-xl flex items-center justify-center">
          ×
        </button>
      </div>

      <form id="editForm">
        <div id="editFormContent" class="p-6 bg-gray-50"></div>

        <div class="flex flex-col sm:flex-row gap-3 justify-end px-6 py-4 border-t bg-white sticky bottom-0">
          <button type="button" id="cancelEdit"
            class="px-5 py-3 rounded-xl border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium">
            İptal
          </button>
          <button type="submit"
            class="px-5 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold shadow-sm">
            Kaydet
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div id="deleteModal" class="modal-backdrop hidden">
  <div style="background:white; padding:16px; border-radius:8px; max-width:480px; width:100%;">
    <h3>İlanı sil</h3>
    <p>Bu ilanı silmek istediğinize emin misiniz? "<span id="propertyName"></span>"</p>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button id="cancelDelete" class="btn">Vazgeç</button>
      <button id="confirmDeleteBtn" class="btn btn-delete">Sil</button>
    </div>
  </div>
</div>



</body>

<script src="js/Urunler.js"></script>

</html>
